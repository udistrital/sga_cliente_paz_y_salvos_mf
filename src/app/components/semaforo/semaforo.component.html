<div class="semaforo-container">
  <div class="semaforo-header">
    <h2>Semáforo Paz y Salvos</h2>
    <button (click)="onRefreshClick()" class="refresh-btn">
      🔄 Recargar datos
    </button>
  </div>

  <ag-grid-angular
    class="ag-theme-alpine semaforo-grid"
     style="width: 100%; height: 500px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);"
    [theme]="'legacy'"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="{ resizable: true }"
    [stopEditingWhenCellsLoseFocus]="true"
    (cellValueChanged)="updateRow($event)"
    (gridReady)="onGridReady($event)">
  </ag-grid-angular>
</div>
