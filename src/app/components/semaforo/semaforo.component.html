<div class="semaforo-container">
  <!-- Header -->
  <div class="semaforo-header">
    <h2>{{ 'SEMAFORO.titulo' | translate }}</h2>
    <button mat-raised-button color="primary" (click)="onRefreshClick()" class="refresh-btn">
      <mat-icon>refresh</mat-icon>
      {{ 'SEMAFORO.recargar_datos' | translate }}
    </button>
  </div>

  <!-- Componente de Filtros -->
  <app-semaforo-filters
    *ngIf="!userRoles.includes('ESTUDIANTE')"
    [userRoles]="userRoles"
    [filters]="filters"
    [facultades]="facultades"
    [proyectos]="proyectos"
    [loadingFacultades]="loadingFacultades"
    [loadingProyectos]="loadingProyectos"
    [expanded]="filtersExpanded"
    (filtersChange)="onFiltersChange($event)"
    (facultadChange)="onFacultadChange($event)"
    (search)="onSearchFilters()"
    (clear)="onClearFilters()">
  </app-semaforo-filters>

  <!-- Componente de Grid -->
  <app-semaforo-grid
    [rowData]="filteredRowData"
    [userRoles]="userRoles"
    (cellValueChanged)="onCellValueChanged($event)"
    (cellClicked)="onCellClicked($event)"
    (gridReady)="onGridReady($event)">
  </app-semaforo-grid>

  <!-- Componente de Paginación -->
  <app-semaforo-pagination
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalRecords]="totalRecords"
    [loading]="loading"
    (pageSizeChange)="onPageSizeChange($event)"
    (firstPage)="onFirstPage()"
    (previousPage)="onPreviousPage()"
    (nextPage)="onNextPage()"
    (lastPage)="onLastPage()">
  </app-semaforo-pagination>
</div>
