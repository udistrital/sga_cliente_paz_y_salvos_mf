kind: pipeline
name: oas_cliente_ci

steps:
  - name: check_readme
    image: jjvargass/qa_develoment:latest
    commands:
      - python /app/check_readme.py
    when:
      branch:
        - develop
        - feature/*
        - release/*
      event:
        - push

  - name: check_commits
    image: jjvargass/qa_develoment:latest
    failure: ignore
    commands:
      - python /app/check_commits.py
    when:
      branch:
        - develop
          - feature/*
          - release/*
      event:
        - push

  - name: build_release
    image: node:lts-bullseye
    commands:
      - node --version
      - npm i
      - npm run build:test
    when:
      branch:
        - release/*
      event:
        - push

  - name: build_master
    image: node:lts-bullseye
    commands:
      - node --version
      - npm i
      - npm run build:prod
    when:
      branch:
        - master
      event:
        - push

  - name: run_sonar_scanner
    image: sonarsource/sonar-scanner-cli:latest
    environment:
      SONAR_HOST_URL:
        from_secret: SONAR_HOST
      SONAR_TOKEN:
        from_secret: SONAR_TOKEN
      SONAR_SCANNER_OPTS: "-Dsonar.working.directory=/tmp/.scannerwork"
    commands:
      - sonar-scanner
    when:
      branch:
        - develop
        - feature/*
        - release/*
      event:
        - push

  - name: publish_s3_release
    image: plugins/s3
    settings:
      bucket: cliente-pruebas
      access_key:
        from_secret: aws_access_key_id
      secret_key:
        from_secret: aws_secret_access_key
      region: us-east-1
      source: dist/**/*
      target: /sga/${DRONE_REPO_NAME}
      strip_prefix: dist/
    when:
      branch:
        - release/*
      event:
        - push

  - name: publish_s3_master
    image: plugins/s3
    settings:
      bucket: cliente-prod
      access_key:
        from_secret: aws_access_key_id
      secret_key:
        from_secret: aws_secret_access_key
      region: us-east-1
      source: dist/**/*
      target: /sga/${DRONE_REPO_NAME}
      strip_prefix: dist/
    when:
      branch:
        - master
      event:
        - push
