kind: pipeline
name: oas_cliente_ci

steps:
- name: build_release
  image: node:18.13.0
  commands:
  - node --version
  - npm i
  - npm run build:test
  when:
    branch:
    - release/*
    event:
    - push

- name: build_master
  image: node:18.13.0
  commands:
  - node --version
  - npm i
  - npm run build:prod
  when:
    branch:
    - master
    event:
    - push

- name: publish_s3_release
  image: plugins/s3
  settings:
    bucket: cliente-pruebas-sga
    access_key:
      from_secret: aws_access_key_id
    secret_key:
      from_secret: aws_secret_access_key
    region: us-east-1
    source: dist/**/*
    target: /${DRONE_REPO_NAME}
    strip_prefix: dist/
  when:
    branch:
    - release/*
    event:
    - push

- name: publish_s3_master
  image: plugins/s3
  settings:
    bucket: cliente-prod-sga
    access_key:
      from_secret: aws_access_key_id
    secret_key:
      from_secret: aws_secret_access_key
    region: us-east-1
    source: dist/**/*
    target: /${DRONE_REPO_NAME}
    strip_prefix: dist/
  when:
    branch:
    - master
    event:
    - push
